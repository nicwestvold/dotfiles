# --- Theme Options (uncomment one palette + the palette = line) ---
# To activate a theme, uncomment the `palette = "..."` line AND the
# corresponding [palettes.xxx] block below.

# palette = "catppuccin_macchiato"
# palette = "tokyo-night"
# palette = "kanagawa-wave"
# Doom One: no official starship port available

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[nodejs]
disabled = true

