# =============================================================================
# Modern Minimal tmux Config
# =============================================================================

# -- Terminal & True Color ----------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# -- Sensible Defaults --------------------------------------------------------
set -sg escape-time 10
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
set -g focus-events on
setw -g mode-keys vi
set -g status-keys vi
set -g allow-rename off

# -- Prefix -------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- Colors -------------------------------------------------------------------
# green:      #8bc66f   green_text: #2d343e
# yellow:     #e3bc77
# blue:       #44aff5   blue_text:  #272c35
# gray:       #3a4048   gray_text:  #a9b2c0
# purple:     #d36fe3   purple_text:#272c35
# teal:       #54b1ba   teal_text:  #2d343e
# primary_bg: #2b323d   primary_fg: #a8b1bf

# -- Pane Borders -------------------------------------------------------------
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#00afff"

# -- Message Style ------------------------------------------------------------
set -g message-style "fg=#2d343e,bg=#8bc66f,bold"
set -g message-command-style "fg=#ffff00,bg=#000000,bold"

# -- Mode Style (copy mode highlight) ----------------------------------------
set -g mode-style "fg=#2d343e,bg=#8bc66f,bold"

# -- Status Bar ---------------------------------------------------------------
set -g status-style "fg=#8a8a8a,bg=#2b323d"
set -g status-interval 15
set -g status-left "\
#[fg=#2d343e,bg=#8bc66f,bold] ℵ #S \
#[fg=#8bc66f,bg=#e3bc77,nobold]\
#[fg=#2d343e,bg=#e3bc77] ↑ #($SCRIPTS/uptime.sh) \
#[fg=#e3bc77,bg=#2b323d] "

# Status left: [green: ℵ session] [yellow: ↑ uptime]
SCRIPTS="~/Development/nic/dotfiles/tmux/scripts"
set -g status-left "\
#[fg=#2d343e,bg=#8bc66f,bold] ℵ #S \
#[fg=#8bc66f,bg=#e3bc77,nobold]\
#[fg=#2d343e,bg=#e3bc77] ↑ #($SCRIPTS/uptime.sh) \
#[fg=#e3bc77,bg=#2b323d] "

# Status right: [gray: battery ‹ time ‹ date] [purple: user] [teal: host]
set -g status-right "\
#{?client_prefix,⌨ ,}#[fg=#3a4048,bg=#2b323d]\
#[fg=#a9b2c0,bg=#3a4048] #($SCRIPTS/battery.sh) \
#[fg=#d36fe3,bg=#3a4048]\
#[fg=#272c35,bg=#d36fe3] %R \
#[fg=#54b1ba,bg=#d36fe3]\
#[fg=#2d343e,bg=#54b1ba,bold] %b %d "

# -- Window Status ------------------------------------------------------------

# Inactive windows
set -g window-status-style "fg=#8a8a8a,bg=#2b323d"
set -g window-status-format " #I #W "

# Active window (blue tab)
set -g window-status-current-style "fg=#272c35,bg=#44aff5,bold"
set -g window-status-current-format "\
#[fg=#2b323d,bg=#44aff5]\
 #I #W \
#[fg=#44aff5,bg=#2b323d]"

# Last active window
set -g window-status-last-style "fg=#44aff5,bg=default"

# Activity
set -g window-status-activity-style "fg=default,bg=default,underscore"
set -g window-status-bell-style "fg=#8bc66f,bg=default,blink,bold"

# Separator between window tabs
set -g window-status-separator ""

# -- Plugins ------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# -- Session Persistence ------------------------------------------------------
set -g @resurrect-processes 'false'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# -- Keybindings (separate file for easy toggling) ----------------------------
source-file ~/Development/nic/dotfiles/tmux/keybindings.conf

# -- TPM Init (must be last) -------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
