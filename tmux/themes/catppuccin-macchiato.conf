# Catppuccin Macchiato — tmux color overrides
# Source this file from .tmux.conf to apply

# Colors:
# base:     #24273a   text:    #cad3f5
# blue:     #8aadf4   mauve:   #c6a0f6
# green:    #a6da95   yellow:  #eed49f
# red:      #ed8796   peach:   #f5a97f
# teal:     #8bd5ca   surface0:#363a4f

set -g pane-border-style "fg=#494d64"
set -g pane-active-border-style "fg=#8aadf4"
set -g message-style "fg=#cad3f5,bg=#363a4f"
set -g message-command-style "fg=#eed49f,bg=#24273a,bold"
set -g mode-style "fg=#24273a,bg=#a6da95,bold"
set -g status-style "fg=#cad3f5,bg=#24273a"

set -g status-left "\
#[fg=#24273a,bg=#a6da95,bold] ℵ #S \
#[fg=#a6da95,bg=#eed49f,nobold]\
#[fg=#24273a,bg=#eed49f] ↑ #($SCRIPTS/uptime.sh) \
#[fg=#eed49f,bg=#24273a] "

set -g status-right "\
#{?client_prefix,⌨ ,}#[fg=#363a4f,bg=#24273a]\
#[fg=#cad3f5,bg=#363a4f] #($SCRIPTS/battery.sh) \
#[fg=#c6a0f6,bg=#363a4f]\
#[fg=#24273a,bg=#c6a0f6] %R \
#[fg=#8bd5ca,bg=#c6a0f6]\
#[fg=#24273a,bg=#8bd5ca,bold] %b %d "

set -g window-status-style "fg=#cad3f5,bg=#24273a"
set -g window-status-current-style "fg=#24273a,bg=#8aadf4,bold"
set -g window-status-current-format "\
#[fg=#24273a,bg=#8aadf4]\
 #I #W \
#[fg=#8aadf4,bg=#24273a]"
set -g window-status-last-style "fg=#8aadf4,bg=default"
set -g window-status-bell-style "fg=#ed8796,bg=default,blink,bold"
