# Doom One — tmux color overrides
# Source this file from .tmux.conf to apply

# Colors:
# bg:       #282c34   fg:      #bbc2cf
# blue:     #51afef   magenta: #c678dd
# green:    #98be65   yellow:  #ecbe7b
# red:      #ff6c6b   orange:  #da8548
# cyan:     #46d9ff   gray:    #3f444a

set -g pane-border-style "fg=#3f444a"
set -g pane-active-border-style "fg=#51afef"
set -g message-style "fg=#bbc2cf,bg=#3f444a"
set -g message-command-style "fg=#ecbe7b,bg=#282c34,bold"
set -g mode-style "fg=#282c34,bg=#98be65,bold"
set -g status-style "fg=#bbc2cf,bg=#282c34"

set -g status-left "\
#[fg=#282c34,bg=#98be65,bold] ℵ #S \
#[fg=#98be65,bg=#ecbe7b,nobold]\
#[fg=#282c34,bg=#ecbe7b] ↑ #($SCRIPTS/uptime.sh) \
#[fg=#ecbe7b,bg=#282c34] "

set -g status-right "\
#{?client_prefix,⌨ ,}#[fg=#3f444a,bg=#282c34]\
#[fg=#bbc2cf,bg=#3f444a] #($SCRIPTS/battery.sh) \
#[fg=#c678dd,bg=#3f444a]\
#[fg=#282c34,bg=#c678dd] %R \
#[fg=#46d9ff,bg=#c678dd]\
#[fg=#282c34,bg=#46d9ff,bold] %b %d "

set -g window-status-style "fg=#bbc2cf,bg=#282c34"
set -g window-status-current-style "fg=#282c34,bg=#51afef,bold"
set -g window-status-current-format "\
#[fg=#282c34,bg=#51afef]\
 #I #W \
#[fg=#51afef,bg=#282c34]"
set -g window-status-last-style "fg=#51afef,bg=default"
set -g window-status-bell-style "fg=#ff6c6b,bg=default,blink,bold"
