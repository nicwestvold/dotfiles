# Tokyo Night (Night) — tmux color overrides
# Source this file from .tmux.conf to apply

# Colors:
# bg:       #1a1b26   fg:      #c0caf5
# blue:     #7aa2f7   purple:  #bb9af7
# cyan:     #7dcfff   green:   #9ece6a
# red:      #f7768e   yellow:  #e0af68
# orange:   #ff9e64   gray:    #33467c

set -g pane-border-style "fg=#33467c"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "fg=#1a1b26,bg=#7aa2f7,bold"
set -g message-command-style "fg=#e0af68,bg=#1a1b26,bold"
set -g mode-style "fg=#1a1b26,bg=#7aa2f7,bold"
set -g status-style "fg=#a9b1d6,bg=#1a1b26"

set -g status-left "\
#[fg=#1a1b26,bg=#9ece6a,bold] ℵ #S \
#[fg=#9ece6a,bg=#e0af68,nobold]\
#[fg=#1a1b26,bg=#e0af68] ↑ #($SCRIPTS/uptime.sh) \
#[fg=#e0af68,bg=#1a1b26] "

set -g status-right "\
#{?client_prefix,⌨ ,}#[fg=#33467c,bg=#1a1b26]\
#[fg=#a9b1d6,bg=#33467c] #($SCRIPTS/battery.sh) \
#[fg=#bb9af7,bg=#33467c]\
#[fg=#1a1b26,bg=#bb9af7] %R \
#[fg=#7aa2f7,bg=#bb9af7]\
#[fg=#1a1b26,bg=#7aa2f7,bold] %b %d "

set -g window-status-style "fg=#a9b1d6,bg=#1a1b26"
set -g window-status-current-style "fg=#1a1b26,bg=#7aa2f7,bold"
set -g window-status-current-format "\
#[fg=#1a1b26,bg=#7aa2f7]\
 #I #W \
#[fg=#7aa2f7,bg=#1a1b26]"
set -g window-status-last-style "fg=#7aa2f7,bg=default"
set -g window-status-bell-style "fg=#f7768e,bg=default,blink,bold"
