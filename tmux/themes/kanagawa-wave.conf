# Kanagawa Wave — tmux color overrides
# Source this file from .tmux.conf to apply

# Colors:
# bg:       #1f1f28   fg:      #dcd7ba
# blue:     #7e9cd8   purple:  #957fb8
# green:    #98bb6c   yellow:  #dca561
# red:      #c34043   orange:  #ffa066
# cyan:     #7fb4ca   gray:    #2a2a37

set -g pane-border-style "fg=#2a2a37"
set -g pane-active-border-style "fg=#7e9cd8"
set -g message-style "fg=#1f1f28,bg=#98bb6c,bold"
set -g message-command-style "fg=#dca561,bg=#1f1f28,bold"
set -g mode-style "fg=#1f1f28,bg=#98bb6c,bold"
set -g status-style "fg=#c8c093,bg=#1f1f28"

set -g status-left "\
#[fg=#1f1f28,bg=#98bb6c,bold] ℵ #S \
#[fg=#98bb6c,bg=#dca561,nobold]\
#[fg=#1f1f28,bg=#dca561] ↑ #($SCRIPTS/uptime.sh) \
#[fg=#dca561,bg=#1f1f28] "

set -g status-right "\
#{?client_prefix,⌨ ,}#[fg=#2a2a37,bg=#1f1f28]\
#[fg=#c8c093,bg=#2a2a37] #($SCRIPTS/battery.sh) \
#[fg=#957fb8,bg=#2a2a37]\
#[fg=#1f1f28,bg=#957fb8] %R \
#[fg=#7fb4ca,bg=#957fb8]\
#[fg=#1f1f28,bg=#7fb4ca,bold] %b %d "

set -g window-status-style "fg=#c8c093,bg=#1f1f28"
set -g window-status-current-style "fg=#1f1f28,bg=#7e9cd8,bold"
set -g window-status-current-format "\
#[fg=#1f1f28,bg=#7e9cd8]\
 #I #W \
#[fg=#7e9cd8,bg=#1f1f28]"
set -g window-status-last-style "fg=#7e9cd8,bg=default"
set -g window-status-bell-style "fg=#c34043,bg=default,blink,bold"
