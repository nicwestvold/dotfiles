# =============================================================================
# tmux Keybindings
# Comment out any line to disable that binding.
# =============================================================================

# -- Config Management --------------------------------------------------------

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Toggle mouse on/off
bind m set -g mouse \; display "Mouse #{?mouse,on,off}"

# -- Pane Navigation ----------------------------------------------------------

# Vim-style
bind -r h select-pane -L                  # Left
bind -r j select-pane -D                  # Down
bind -r k select-pane -U                  # Up
bind -r l select-pane -R                  # Right

# Arrow keys
bind Up    select-pane -U                 # Up
bind Down  select-pane -D                 # Down
bind Left  select-pane -L                 # Left
bind Right select-pane -R                 # Right

# -- Pane Resizing (vim-style, repeatable) ------------------------------------

bind -r H resize-pane -L 2               # Resize left
bind -r J resize-pane -D 2               # Resize down
bind -r K resize-pane -U 2               # Resize up
bind -r L resize-pane -R 2               # Resize right

# -- Pane Swapping ------------------------------------------------------------

bind > swap-pane -D                       # Swap with next pane
bind < swap-pane -U                       # Swap with previous pane

# -- Splitting (preserves current path) --------------------------------------

bind - split-window -v -c "#{pane_current_path}"     # Split vertical
bind _ split-window -h -c "#{pane_current_path}"     # Split horizontal
bind | split-window -h -c "#{pane_current_path}"     # Split horizontal (alt)

# -- Window Navigation -------------------------------------------------------

bind -r C-h previous-window               # Previous window
bind -r C-l next-window                   # Next window
bind Tab last-window                      # Last active window
bind + resize-pane -Z                     # Maximize/restore pane

# -- Session Navigation ------------------------------------------------------

bind C-c new-session                      # Create new session
bind C-f command-prompt -p find-session 'switch-client -t %%'  # Find session
bind BTab switch-client -l                # Last session (Shift+Tab)

# -- Copy Mode (vi) ----------------------------------------------------------

unbind [
bind Escape copy-mode                     # Enter copy mode
bind -T copy-mode-vi v send-keys -X begin-selection           # Begin selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle        # Rectangle select
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel  # Copy & exit
bind -T copy-mode-vi Escape send-keys -X cancel               # Cancel
bind -T copy-mode-vi H send-keys -X start-of-line             # Start of line
bind -T copy-mode-vi L send-keys -X end-of-line               # End of line

# -- Buffer Management -------------------------------------------------------

bind b list-buffers                       # List paste buffers
unbind p
bind p paste-buffer                       # Paste from top buffer
bind P choose-buffer                      # Choose which buffer to paste
bind -T copy-mode 'C-\' send-keys -X copy-pipe-and-cancel "pbcopy"  # Copy to clipboard

# -- Misc ---------------------------------------------------------------------

# Clear screen and history (no prefix needed)
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history
